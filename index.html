<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งซ่อม</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            background-color: #f4f6f9; 
        }
        .iframe-container {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%; /* ปรับความสูงเป็น 100% เต็มจอปกติ */
            margin-top: 0; /* ปรับเป็น 0 ไม่ต้องดันขึ้นแล้ว */
            border: none;
        }
        
        /* ลบส่วน @media อันเดิมทิ้งไปได้เลยครับ หรือถ้ายังมีอยู่ให้ปรับเป็น 0 แบบนี้ */
        @media only screen and (max-width: 600px) {
            iframe {
                height: 100%; 
                margin-top: 0; 
            }
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe id="gasIframe" src=""></iframe>
    </div>

    <script>
        // 1. ดึงค่า parameter 'page' จาก URL ของ GitHub
        const urlParams = new URLSearchParams(window.location.search);
        const pageParam = urlParams.get('page');

        // 2. URL ต้นทางของ Google Apps Script
        let baseUrl = "https://script.google.com/macros/s/AKfycbz1bkkNLlkO3B7TrgyEvE_gYad9jg2cP1LojubSJvMiRAWIUR0dba8pZx3O7YMKaN-8jw/exec";

        // 3. ตรวจสอบเงื่อนไข และเปลี่ยนชื่อแท็บ (document.title) ให้ตรงกับหน้าจอ
        if (pageParam === 'admin') {
            baseUrl += "?page=admin";
            document.title = "ระบบบริหารจัดการงานซ่อม (Dashboard)"; // <-- ชื่อแท็บหน้า Admin
        } else if (pageParam === 'tech') {
            baseUrl += "?page=tech";
            document.title = "Technician Portal (สำหรับช่าง)"; // <-- ชื่อแท็บหน้าช่าง
        } else {
            document.title = "ระบบแจ้งซ่อมบำรุง (Maintenance System)"; // <-- ชื่อแท็บหน้าแจ้งซ่อมปกติ
        }

        // 4. สั่งให้ iframe โหลด URL ที่ถูกต้อง
        document.getElementById('gasIframe').src = baseUrl;
    </script>
</body>
</html>
